<style>

  nav {

  .nav-rule { width: 1px; height: 16px; background: var(--border2); margin: 0 1.4rem; flex-shrink: 0; }
  .nav-tagline { font-family: var(--mono); font-size: 10px; color: var(--faint); letter-spacing: 0.15em; text-transform: uppercase; }
  .nav-links { display: flex; gap: 2rem; list-style: none; margin-left: auto; }
  .nav-links a { font-family: var(--mono); font-size: 10px; color: var(--muted); text-decoration: none; letter-spacing: 0.15em; text-transform: uppercase; transition: color 0.2s; }

  /* PERSON COLUMN HEADERS — name on left, sprite on right */

  /* PAGE */

  .page-stamp { display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink2); border: 1px solid rgba(122,158,138,0.35); border-radius: 2px; padding: 4px 10px; margin-bottom: 1.5rem; }

// Helper: draw a 2D pixel grid onto a canvas context
function drawGrid(ctx, grid, ps) {
  for (let r = 0; r < grid.length; r++)
    for (let c = 0; c < grid[r].length; c++)
      if (grid[r][c]) {
        ctx.fillStyle = grid[r][c];
        ctx.fillRect(c * ps, r * ps, ps, ps);
      }
}

function attachSprite(canvasEl, gridFn, cols, rows, walk) {
  canvasEl.width  = cols * PS;
  canvasEl.height = rows * PS;
  canvasEl.style.width  = (cols * PS) + 'px';
  canvasEl.style.height = (rows * PS) + 'px';
  const ctx = canvasEl.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  let frame = 0;
  function tick() {
    ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
    drawGrid(ctx, gridFn(frame), PS);
    if (walk) frame = (frame + 1) % 2;
  }
  tick();
  if (walk) setInterval(tick, 300);
}

};

function gameCards(items) {
  if (!items || items.length === 0)
    return `<p class="empty-col">Nothing here yet.</p>`;
  return `<div class="game-list">${items.map(g => {
    const sc = g.status === 'playing' ? 'status-playing' : 'status-paused';
    const sl = g.status === 'playing' ? '▶ Playing' : '⏸ Paused';
    const cover = g.cover && COVERS[g.cover];
    const bannerHtml = cover
      ? `<div class="game-banner" style="background:${cover.bg}">
           <img src="${cover.url}" alt="${g.title}"/>
         </div>`
      : `<div class="game-banner"><div class="game-banner-placeholder">🎮</div></div>`;
    return `<div class="game-card">
      ${bannerHtml}
      <div class="game-info">
        ${g.platform ? `<div class="game-platform">${g.platform}</div>` : ''}
        <div class="game-title">${g.title}</div>
        ${g.note ? `<div class="game-note">${g.note}</div>` : ''}
        ${g.status ? `<span class="status ${sc}">${sl}</span>` : ''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function colBlock(label, content) {
  const block = document.createElement('div');
  block.className = 'col-block';
  block.innerHTML = `<div class="col-block-label">${label}</div><div class="col-block-body">${content}</div>`;
  return block;
}
