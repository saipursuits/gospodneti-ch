<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Side Quests — The Gospodnetich Log</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #100e0b;
    --bg2:     #17140f;
    --bg3:     #1f1b14;
    --border:  rgba(210,185,145,0.1);
    --border2: rgba(210,185,145,0.18);
    --text:    #e6dfd3;
    --muted:   #8a8070;
    --faint:   #4a4438;
    --ink:     #c8b48a;
    --ink2:    #7a9e8a;
    --serif:   'Playfair Display', Georgia, serif;
    --body:    'Crimson Pro', Georgia, serif;
    --mono:    'DM Mono', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--body); font-size: 17px; font-weight: 300; min-height: 100vh; overflow-x: hidden; }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(16,14,11,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 2.5rem; height: 58px;
  }
  .nav-logo { font-family: var(--serif); font-size: 17px; font-weight: 400; color: var(--text); letter-spacing: 0.02em; text-decoration: none; }
  .nav-logo .tld { color: var(--ink); font-style: italic; }
  .nav-rule { width: 1px; height: 16px; background: var(--border2); margin: 0 1.4rem; flex-shrink: 0; }
  .nav-tagline { font-family: var(--mono); font-size: 10px; color: var(--faint); letter-spacing: 0.15em; text-transform: uppercase; }
  .nav-links { display: flex; gap: 2rem; list-style: none; margin-left: auto; }
  .nav-links a { font-family: var(--mono); font-size: 10px; color: var(--muted); text-decoration: none; letter-spacing: 0.15em; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--ink); }

  /* KIKI IDLE — sits next to page title */
  .page-title-row { display: flex; align-items: center; gap: 1.25rem; }
  @keyframes breathe { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
  .kiki-idle { image-rendering: pixelated; display: block; animation: breathe 3s ease-in-out infinite; }

  /* PERSON COLUMN HEADERS — name on left, sprite on right */
  canvas { image-rendering: pixelated; display: block; }
  .person-col-header canvas { max-height: 48px; width: auto; }

  /* PAGE */
  .page-header { max-width: 1100px; margin: 0 auto; padding: 4rem 2.5rem 3rem; }
  .page-stamp { display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink2); border: 1px solid rgba(122,158,138,0.35); border-radius: 2px; padding: 4px 10px; margin-bottom: 1.5rem; }
  .page-title { font-family: var(--serif); font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 400; line-height: 1.05; }
  .page-title em { color: var(--ink); font-style: italic; }
  .page-rule { width: 48px; height: 1px; background: var(--border2); margin: 1.5rem 0; }
  .page-sub { font-size: 17px; color: var(--muted); line-height: 1.75; max-width: 480px; font-style: italic; }

  .ruled-divider { max-width: 1100px; margin: 0 auto; padding: 0 2.5rem; display: flex; align-items: center; gap: 1rem; }
  .ruled-divider::before, .ruled-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .ruled-divider span { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--faint); white-space: nowrap; }

  /* MAIN TWO-COLUMN LAYOUT — fully independent columns with gap */
  .duo-wrap { max-width: 1100px; margin: 3rem auto 0; padding: 0 2.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
  .person-col { display: flex; flex-direction: column; gap: 1rem; }
  .person-col-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border2); margin-bottom: 0.25rem; }
  .person-col-name { font-family: var(--serif); font-size: 1.4rem; font-weight: 400; font-style: italic; color: var(--ink); }

  /* INDIVIDUAL CONTAINERS within each column */
  .col-block { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .col-block-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--faint); padding: 0.65rem 1.25rem; background: var(--bg3); border-bottom: 1px solid var(--border); }
  .col-block-body { padding: 1.25rem; background: var(--bg); }

  /* GAME CARDS */
  .game-list { display: flex; flex-direction: column; gap: 8px; }
  .game-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: border-color 0.2s; }
  .game-card:hover { border-color: var(--border2); }
  .game-banner { width: 100%; height: 100px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .game-banner img { width: 100%; height: 100%; object-fit: contain; object-position: center; display: block; }
  .game-banner-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2rem; background: var(--bg3); color: var(--faint); }
  .game-info { padding: 0.75rem 1rem; border-top: 1px solid var(--border); }
  .game-platform { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--faint); margin-bottom: 3px; }
  .game-title { font-family: var(--serif); font-size: 1.05rem; font-weight: 400; color: var(--text); line-height: 1.2; }
  .game-note { font-size: 13px; color: var(--muted); font-style: italic; margin-top: 4px; line-height: 1.5; }
  .status { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border-radius: 2px; display: inline-block; margin-top: 5px; }
  .status-playing { background: rgba(122,158,138,0.15); color: var(--ink2); border: 1px solid rgba(122,158,138,0.3); }
  .status-paused  { background: rgba(200,180,138,0.1); color: var(--ink); border: 1px solid rgba(200,180,138,0.25); }
  .empty-col { font-family: var(--mono); font-size: 10px; color: var(--faint); letter-spacing: 0.06em; line-height: 1.7; padding: 0.5rem 0; }

  /* PROFILES — split cards matching duo layout */
  .profiles-wrap { max-width: 1100px; margin: 3rem auto 0; padding: 0 2.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
  .profile-col { display: flex; flex-direction: column; gap: 1rem; }
  .profile-col-header { font-family: var(--serif); font-size: 1.4rem; font-weight: 400; font-style: italic; color: var(--ink); padding-bottom: 0.75rem; border-bottom: 1px solid var(--border2); margin-bottom: 0.25rem; }
  /* STEAM PROFILE CARD */
  .steam-card { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: border-color 0.2s; }
  .steam-card:hover { border-color: var(--border2); }
  .steam-card-inner { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; background: var(--bg2); }
  .steam-avatar { width: 56px; height: 56px; border-radius: 4px; flex-shrink: 0; background: var(--bg3); border: 2px solid #4a90d9; }
  .steam-avatar img { width: 100%; height: 100%; border-radius: 3px; display: block; }
  .steam-info { flex: 1; min-width: 0; }
  .steam-name { font-family: var(--serif); font-size: 1.1rem; font-weight: 400; color: var(--text); }
  .steam-status { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; margin-top: 3px; }
  .steam-status.online  { color: #7a9e8a; }
  .steam-status.offline { color: var(--faint); }
  .steam-status.ingame  { color: #90c8a0; }
  .steam-meta { font-family: var(--mono); font-size: 10px; color: var(--faint); margin-top: 5px; letter-spacing: 0.05em; }
  .steam-link { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #4a90d9; text-decoration: none; }
  .steam-link:hover { color: var(--text); }
  .steam-loading { font-family: var(--mono); font-size: 10px; color: var(--faint); padding: 1rem 1.25rem; background: var(--bg2); }

  /* STATIC PROFILE CARD — matches Steam card layout */
  .static-card-inner { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; background: var(--bg2); }
  .static-service-icon { width: 40px; height: 40px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .static-service-icon svg { width: 24px; height: 24px; display: block; }
  .static-info { flex: 1; min-width: 0; }
  .static-name { font-family: var(--serif); font-size: 1.1rem; font-weight: 400; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .clan-tag { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; padding: 2px 7px; border-radius: 2px; background: rgba(114,137,218,0.15); color: #7289da; border: 1px solid rgba(114,137,218,0.3); flex-shrink: 0; }
  .static-label { font-family: var(--mono); font-size: 10px; color: var(--faint); letter-spacing: 0.08em; margin-top: 3px; }
  .copy-btn {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    background: none; border: 1px solid var(--border); border-radius: 2px;
    color: var(--muted); cursor: pointer; padding: 4px 10px; flex-shrink: 0;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--border2); color: var(--text); }
  .copy-btn.copied { color: var(--ink2); border-color: var(--ink2); }

  .profile-card { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: border-color 0.2s; }
  .profile-card:hover { border-color: var(--border2); }
  .profile-card-header { display: flex; align-items: center; gap: 8px; padding: 0.75rem 1.25rem; background: var(--bg3); border-bottom: 1px solid var(--border); }
  .service-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot-steam   { background: #4a90d9; }
  .dot-battle  { background: #00aeff; }
  .dot-discord { background: #7289da; }
  .profile-service-name { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .profile-card-body { padding: 1rem 1.25rem; background: var(--bg2); }
  .handle { font-family: var(--mono); font-size: 13px; color: var(--ink); }
  .handle a { color: inherit; text-decoration: none; }
  .handle a:hover { color: var(--text); }
  .handle-empty { font-family: var(--mono); font-size: 11px; color: var(--faint); }

  footer { max-width: 1100px; margin: 5rem auto 2rem; padding: 2rem 2.5rem 0; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--faint); letter-spacing: 0.12em; }
  .footer-mark { color: var(--ink2); margin: 0 6px; }

  /* ── MOBILE NAV ── */
  .nav-hamburger { display: none; background: none; border: 1px solid var(--border); border-radius: 2px; padding: 5px 9px; cursor: pointer; margin-left: auto; }
  .nav-hamburger span { display: block; width: 16px; height: 1px; background: var(--muted); margin: 3px 0; transition: background 0.2s; }
  .nav-hamburger:hover span { background: var(--ink); }

  @media (max-width: 700px) {
    nav { padding: 0 1.25rem; flex-wrap: wrap; height: auto; min-height: 52px; }
    .nav-rule, .nav-tagline { display: none; }
    .nav-hamburger { display: block; }
    .nav-links { display: none; width: 100%; flex-direction: column; gap: 0; border-top: 1px solid var(--border); margin-left: 0; padding: 0.5rem 0; }
    .nav-links.open { display: flex; }
    .nav-links li { width: 100%; }
    .nav-links a { display: block; padding: 0.6rem 0; }

    .page-header { padding: 2.5rem 1.25rem 2rem; }
    .ruled-divider { padding: 0 1.25rem; }

    .duo-wrap { padding: 0 1.25rem; grid-template-columns: 1fr; gap: 1.5rem; }
    .profiles-wrap { padding: 0 1.25rem; grid-template-columns: 1fr; gap: 1.5rem; }

    footer { padding: 1.5rem 1.25rem 0; flex-direction: column; gap: 0.5rem; text-align: center; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">gospodneti<span class="tld">.ch</span></a>
  <div class="nav-rule"></div>
  <span class="nav-tagline">Family Log</span>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  <ul class="nav-links" id="nav-links">
    <li><a href="schedule.html">Schedule</a></li>
    <li><a href="chronicle.html">Chronicle</a></li>
    <li><a href="sidequests.html" class="active">Side Quests</a></li>
  </ul>
</nav>

<div class="page-header">
  <span class="page-stamp">Active Pursuits</span>
  <div class="page-title-row">
    <h1 class="page-title">Side <em>Quests</em></h1>
  </div>
  <div class="page-rule"></div>
  <p class="page-sub">What we're playing and whatever else we're chasing down.</p>
</div>

<div class="ruled-divider"><span>Games</span></div>

<!-- Two fully independent columns -->
<div class="duo-wrap">
  <div class="person-col" id="sai-col">
    <div class="person-col-header">
      <span class="person-col-name">Sai</span>
    </div>
    <!-- injected by JS -->
  </div>
  <div class="person-col" id="dom-col">
    <div class="person-col-header">
      <span class="person-col-name">Dominic</span>
    </div>
    <!-- injected by JS -->
  </div>
</div>

<div class="ruled-divider" style="margin-top:3rem"><span>Find Us Online</span></div>

<div class="profiles-wrap">
  <div class="profile-col" id="sai-profiles"></div>
  <div class="profile-col" id="dom-profiles"></div>
</div>

<footer>
  <span>gospodneti.ch</span>
  <span>Private<span class="footer-mark">·</span>2026</span>
</footer>

<script>
// ============================================================
// YOUR GAMES
// ============================================================
const SAI_PLAYING = [
  { title: "World of Warcraft: Midnight", platform: "PC · Battle.net", status: "playing", note: "The Worldsoul Saga continues — defending the Sunwell in Quel'Thalas.", cover: "wow-midnight" },
];
const DOM_PLAYING = [
  { title: "World of Warcraft: Midnight", platform: "PC · Battle.net", status: "playing", note: "Playing alongside Sai — for the Horde? For the Alliance? TBD.", cover: "wow-midnight" },
  { title: "Warframe", platform: "PC · Steam", status: "playing", note: "Free to play, impossible to stop.", cover: "warframe" },
  { title: "S.T.A.L.K.E.R. 2: Heart of Chornobyl", platform: "PC · Steam", status: "playing", note: "Surviving the Zone one emission at a time.", cover: "stalker2" },
];
const SAI_WISHLIST = [
  // { title: "Silksong", platform: "TBD", note: "...waiting." },
];
const DOM_WISHLIST = [
  // { title: "Elden Ring DLC", platform: "PC" },
];

// ============================================================
// YOUR PROFILES
// ============================================================
const PROFILES = [
  { service: 'Steam',      dotClass: 'dot-steam',
    sai: { handle: '사이', url: 'https://steamcommunity.com/id/itssai/' }, dom: { handle: 'HUMUNGA DUNGA', url: 'https://steamcommunity.com/profiles/76561197982608920' } },
  { service: 'Battle.net', dotClass: 'dot-battle',
    sai: { handle: 'Sai#1429', tag: null }, dom: { handle: 'Platinum#1593', tag: null } },
  { service: 'Discord',    dotClass: 'dot-discord',
    sai: { handle: 'sai.ri', tag: 'CULT' }, dom: { handle: 'platinumpancakes', tag: 'BAZZ' } },
];



// ============================================================
// GAME COVER ART
// Each cover is an 80×80 SVG. Add a new entry here per game.
// key matches the 'cover' field in your game arrays above.
// ============================================================
const COVERS = {
  'wow-midnight': {
    url: 'https://blz-contentstack-images.akamaized.net/v3/assets/blt3452e3b114fab0cd/blt8d3cecf84f200ed6/68a4ed936a17f5492299906f/midnight-logo-1.png',
    bg: '#0d0820'
  },
  'warframe': {
    url: 'https://www-static.warframe.com/images/logo.png',
    bg: '#050c10'
  },
  'stalker2': {
    url: 'https://www.stalker2.com/stalker2/logos/logo-S2.png',
    bg: '#0a0c08'
  },
};

function gameCards(items) {
  if (!items || items.length === 0)
    return `<p class="empty-col">Nothing here yet.</p>`;
  return `<div class="game-list">${items.map(g => {
    const sc = g.status === 'playing' ? 'status-playing' : 'status-paused';
    const sl = g.status === 'playing' ? '▶ Playing' : '⏸ Paused';
    const cover = g.cover && COVERS[g.cover];
    const bannerHtml = cover
      ? `<div class="game-banner" style="background:${cover.bg}">
           <img src="${cover.url}" alt="${g.title}"/>
         </div>`
      : `<div class="game-banner"><div class="game-banner-placeholder">🎮</div></div>`;
    return `<div class="game-card">
      ${bannerHtml}
      <div class="game-info">
        ${g.platform ? `<div class="game-platform">${g.platform}</div>` : ''}
        <div class="game-title">${g.title}</div>
        ${g.note ? `<div class="game-note">${g.note}</div>` : ''}
        ${g.status ? `<span class="status ${sc}">${sl}</span>` : ''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function colBlock(label, content) {
  const block = document.createElement('div');
  block.className = 'col-block';
  block.innerHTML = `<div class="col-block-label">${label}</div><div class="col-block-body">${content}</div>`;
  return block;
}

document.getElementById('sai-col').appendChild(colBlock('Currently Playing', gameCards(SAI_PLAYING)));
document.getElementById('dom-col').appendChild(colBlock('Currently Playing', gameCards(DOM_PLAYING)));


// ============================================================
// STEAM PROFILE CARDS
// ============================================================
async function loadSteamCard(containerId, steamId, profileUrl, fallbackName) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = `<div class="steam-card"><div class="steam-loading">Loading Steam profile...</div></div>`;

  try {
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://steamcommunity.com/profiles/${steamId}/?xml=1`)}`;
    const res = await fetch(proxy);
    const data = await res.json();
    const xml = new DOMParser().parseFromString(data.contents, 'text/xml');

    const name     = xml.querySelector('steamID')?.textContent || fallbackName;
    const avatar   = xml.querySelector('avatarFull')?.textContent || '';
    const stateNum = parseInt(xml.querySelector('onlineState')?.textContent || '0');
    const inGame   = xml.querySelector('inGameInfo gameName')?.textContent || '';

    const statusLabel = inGame ? `▶ ${inGame}` : stateNum === 1 ? '● Online' : '● Offline';
    const statusClass = inGame ? 'ingame' : stateNum === 1 ? 'online' : 'offline';

    el.innerHTML = `
      <div class="steam-card">
        <div class="steam-card-inner">
          <div class="steam-avatar">
            <img src="${avatar}" alt="${name}" onerror="this.style.display='none'"/>
          </div>
          <div class="steam-info">
            <div class="steam-name">${name}</div>
            <div class="steam-status ${statusClass}">${statusLabel}</div>
          </div>
          <a href="${profileUrl}" target="_blank" class="steam-link">View →</a>
        </div>
      </div>`;
  } catch (e) {
    el.innerHTML = `
      <div class="steam-card">
        <div class="steam-card-inner">
          <div class="steam-info">
            <div class="steam-name">${fallbackName}</div>
            <div class="steam-meta">Steam profile</div>
          </div>
          <a href="${profileUrl}" target="_blank" class="steam-link">View →</a>
        </div>
      </div>`;
  }
}

function serviceIcon(service) {
  if (service === 'Battle.net') {
    return '<img src="bnet-icon.png" style="width:24px;height:24px;display:block;border-radius:4px;" alt="Battle.net"/>';
  }
  // Discord
  return '<svg viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg" style="width:24px;height:20px;display:block;"><path fill="#7289da" d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0a105.89 105.89 0 0 0-26.25 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2a75.57 75.57 0 0 0 64.32 0c.87.71 1.76 1.39 2.66 2a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 11.1 105.25 105.25 0 0 0 32.19-16.14c2.64-27.38-4.51-51.11-18.9-72.15zM42.45 65.69C36.18 65.69 31 60 31 53s5-12.74 11.43-12.74S54 46 53.89 53s-5.05 12.69-11.44 12.69zm42.24 0C78.41 65.69 73.25 60 73.25 53s5-12.74 11.44-12.74S96.23 46 96.12 53s-5.04 12.69-11.43 12.69z"/></svg>';
}

// ============================================================
// COPY TO CLIPBOARD
// ============================================================
function copyHandle(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ============================================================
// RENDER PROFILES AS INDEPENDENT CARDS PER PERSON
// ============================================================
const saiProfiles = document.getElementById('sai-profiles');
const domProfiles = document.getElementById('dom-profiles');

PROFILES.forEach(p => {
  const saiH = p.sai.handle;
  const domH = p.dom.handle;

  const saiCard = document.createElement('div');
  saiCard.className = 'profile-card';

  // For Steam, replace body with live Steam card
  if (p.service === 'Steam') {
    saiCard.innerHTML = `
      <div class="profile-card-header">
        <span class="service-dot ${p.dotClass}"></span>
        <span class="profile-service-name">${p.service}</span>
      </div>
      <div id="sai-steam-card"></div>`;
  } else {
    const handle = p.sai.handle;
    const iconColor = p.service === 'Battle.net' ? '#00aeff' : '#7289da';
    const tagBadge = p.sai.tag ? `<span class="clan-tag">${p.sai.tag}</span>` : '';
    const header = `<div class="profile-card-header"><span class="service-dot ${p.dotClass}"></span><span class="profile-service-name">${p.service}</span></div>`;
    const copyBtn = handle ? `<button class="copy-btn" onclick="copyHandle(this,'${handle}')">Copy</button>` : '';
    saiCard.innerHTML = header;
    const inner = document.createElement('div');
    inner.className = 'static-card-inner';
    const iconDiv = document.createElement('div');
    iconDiv.className = 'static-service-icon';
    iconDiv.style.background = iconColor + '22';
    iconDiv.innerHTML = serviceIcon(p.service);
    const infoDiv = document.createElement('div');
    infoDiv.className = 'static-info';
    infoDiv.innerHTML = `<div class="static-name">${handle || '—'}${tagBadge}</div><div class="static-label">${p.service} handle</div>`;
    inner.appendChild(iconDiv);
    inner.appendChild(infoDiv);
    if (handle) { const btn = document.createElement('button'); btn.className = 'copy-btn'; btn.textContent = 'Copy'; btn.onclick = () => copyHandle(btn, handle); inner.appendChild(btn); }
    saiCard.appendChild(inner);
  }
  saiProfiles.appendChild(saiCard);

  const domCard = document.createElement('div');
  domCard.className = 'profile-card';
  if (p.service === 'Steam') {
    domCard.innerHTML = `
      <div class="profile-card-header">
        <span class="service-dot ${p.dotClass}"></span>
        <span class="profile-service-name">${p.service}</span>
      </div>
      <div id="dom-steam-card"></div>`;
  } else {
    const handle = p.dom.handle;
    const iconColor = p.service === 'Battle.net' ? '#00aeff' : '#7289da';
    const tagBadge = p.dom.tag ? `<span class="clan-tag">${p.dom.tag}</span>` : '';
    const header = `<div class="profile-card-header"><span class="service-dot ${p.dotClass}"></span><span class="profile-service-name">${p.service}</span></div>`;
    domCard.innerHTML = header;
    const inner = document.createElement('div');
    inner.className = 'static-card-inner';
    const iconDiv = document.createElement('div');
    iconDiv.className = 'static-service-icon';
    iconDiv.style.background = iconColor + '22';
    iconDiv.innerHTML = serviceIcon(p.service);
    const infoDiv = document.createElement('div');
    infoDiv.className = 'static-info';
    infoDiv.innerHTML = `<div class="static-name">${handle || '—'}${tagBadge}</div><div class="static-label">${p.service} handle</div>`;
    inner.appendChild(iconDiv);
    inner.appendChild(infoDiv);
    if (handle) { const btn = document.createElement('button'); btn.className = 'copy-btn'; btn.textContent = 'Copy'; btn.onclick = () => copyHandle(btn, handle); inner.appendChild(btn); }
    domCard.appendChild(inner);
  }
  domProfiles.appendChild(domCard);
});
